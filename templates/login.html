<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign In – Elevate Retail</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #2E3440;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: #3B4252;
            border: 1px solid #4C566A;
            border-radius: 12px;
            padding: 2rem;
            width: 320px;
        }
        h2 {
            color: #ECEFF4;
            margin: 0 0 4px;
        }
        .subtitle {
            color: #D8DEE9;
            font-size: 13px;
            margin: 0 0 1.25rem;
        }
        label {
            display: block;
            font-size: 12px;
            color: #D8DEE9;
            margin-bottom: 4px;
        }
        input {
            width: 100%;
            box-sizing: border-box;
            background: #434C5E;
            border: 1px solid #4C566A;
            border-radius: 6px;
            color: #ECEFF4;
            padding: 8px 10px;
            font-size: 14px;
            margin-bottom: 12px;
        }
        .btn {
            width: 100%;
            background: #5E81AC;
            color: #ECEFF4;
            border: none;
            border-radius: 6px;
            padding: 9px;
            font-size: 14px;
            cursor: pointer;
            margin-top: 4px;
        }
        .btn:hover {
            background: #81A1C1;
        }
        .flash {
            background: #3B4252;
            border: 1px solid #BF616A;
            color: #BF616A;
            border-radius: 6px;
            padding: 8px 10px;
            font-size: 13px;
            margin-bottom: 12px;
        }
        .link-row {
            text-align: center;
            font-size: 13px;
            color: #D8DEE9;
            margin-top: 1rem;
        }
        .link-row a {
            color: #81A1C1;
            text-decoration: none;
        }
    </style>
</head>
<body>
<div class="card">
    <h2>Sign in</h2>
    <p class="subtitle">Welcome back to Elevate Retail</p>
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for msg in messages %}
                <div class="flash">{{ msg }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}
    <form action="{{ url_for('auth.login') }}" method="POST">
        <label>Email</label>
        <input type="email" name="email" placeholder="you@email.com" required>
        <label>First name</label>
        <input type="text" name="first_name" placeholder="As it appears on your account" required>
        <button class="btn" type="submit">Sign in</button>
    </form>
    <div class="link-row">Don't have an account? <a href="{{ url_for('auth.register') }}">Sign up</a></div>
</div>
</body>
</html>
