<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up – Elevate Retail</title>
    <style>
        html {
            min-height: 100%;
            background: #2E3440;
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            position: relative;
            padding: 20px;
            box-sizing: border-box;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            z-index: -1;
            background:
                linear-gradient(rgba(255, 255, 255, 0.10), rgba(46, 52, 64, 0.25)),
                url("{{ url_for('static', filename='product_page_background.png') }}");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transform: translateZ(0);
            will-change: transform;
        }

        .card {
            background: rgba(174, 184, 198, 0.94);
            border: 1px solid #8F9AAA;
            border-radius: 12px;
            padding: 2rem;
            width: 340px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.28);
        }

        h2 {
            color: #2E3440;
            margin: 0 0 4px;
            font-size: 28px;
        }

        .subtitle {
            color: #3B4252;
            font-size: 14px;
            margin: 0 0 1.25rem;
        }

        label {
            display: block;
            font-size: 12px;
            color: #3B4252;
            margin-bottom: 4px;
            font-weight: bold;
        }

        input {
            width: 100%;
            box-sizing: border-box;
            background: #FFFFFF;
            border: 1px solid #C7D0DD;
            border-radius: 6px;
            color: #2E3440;
            padding: 8px 10px;
            font-size: 14px;
            margin-bottom: 12px;
        }

        input::placeholder {
            color: #7B8794;
        }

        .btn {
            width: 100%;
            background: #5E81AC;
            color: #ECEFF4;
            border: none;
            border-radius: 6px;
            padding: 10px;
            font-size: 14px;
            cursor: pointer;
            margin-top: 4px;
            font-weight: bold;
        }

        .btn:hover {
            background: #81A1C1;
        }

        .flash {
            background: #F4D6D9;
            border: 1px solid #BF616A;
            color: #8F2E36;
            border-radius: 6px;
            padding: 8px 10px;
            font-size: 13px;
            margin-bottom: 12px;
            font-weight: bold;
        }

        .link-row {
            text-align: center;
            font-size: 13px;
            color: #3B4252;
            margin-top: 1rem;
        }

        .link-row a {
            color: #5E81AC;
            text-decoration: none;
            font-weight: bold;
        }

        .link-row a:hover {
            color: #2E3440;
            text-decoration: underline;
        }

        .optional {
            color: #5E81AC;
            font-size: 11px;
            margin-left: 4px;
        }

        @media (max-width: 500px) {
            body {
                padding: 12px;
            }

            .card {
                width: 100%;
                box-sizing: border-box;
            }
        }
    </style>
</head>
<body>
<div class="card">
    <h2>Create account</h2>
    <p class="subtitle">Get started with Elevate Retail</p>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for msg in messages %}
                <div class="flash">{{ msg }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form action="{{ url_for('auth.register') }}" method="POST">
        <label>First name</label>
        <input type="text" name="first_name" placeholder="Jane" required>

        <label>Last name</label>
        <input type="text" name="last_name" placeholder="Doe" required>

        <label>Email</label>
        <input type="email" name="email" placeholder="you@email.com" required>

        <label>Phone <span class="optional">optional</span></label>
        <input type="tel" name="phone" id="phone" placeholder="(555) 867-5309" maxlength="14" oninput="formatPhone(this)">

        <button class="btn" type="submit">Create account</button>
    </form>

    <div class="link-row">Already have an account? <a href="{{ url_for('auth.login') }}">Sign in</a></div>
</div>

<script>
    function formatPhone(input) {
        let digits = input.value.replace(/\D/g, '').substring(0, 10);
        let len = digits.length;

        if (len === 0) {
            input.value = '';
        } else if (len <= 3) {
            input.value = '(' + digits;
        } else if (len <= 6) {
            input.value = '(' + digits.slice(0, 3) + ') ' + digits.slice(3);
        } else {
            input.value = '(' + digits.slice(0, 3) + ') ' + digits.slice(3, 6) + '-' + digits.slice(6);
        }
    }
</script>
</body>
</html>
