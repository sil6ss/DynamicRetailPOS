<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign In – Elevate Retail</title>
    <style>
        html {
            min-height: 100%;
            background: #2E3440;
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            position: relative;
            padding: 20px;
            box-sizing: border-box;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            z-index: -1;
            background:
                linear-gradient(rgba(255, 255, 255, 0.10), rgba(46, 52, 64, 0.25)),
                url("{{ url_for('static', filename='product_page_background.png') }}");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transform: translateZ(0);
            will-change: transform;
        }

        .card {
            background: rgba(59, 66, 82, 0.94);
            border: 1px solid #4C566A;
            border-radius: 12px;
            padding: 2rem;
            width: 320px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.28);
        }

        h2 {
            color: #ECEFF4;
            margin: 0 0 4px;
        }

        .subtitle {
            color: #D8DEE9;
            font-size: 13px;
            margin: 0 0 1.25rem;
        }

        label {
            display: block;
            font-size: 12px;
            color: #D8DEE9;
            margin-bottom: 4px;
            font-weight: bold;
        }

        input {
            width: 100%;
            box-sizing: border-box;
            background: #434C5E;
            border: 1px solid #4C566A;
            border-radius: 6px;
            color: #ECEFF4;
            padding: 8px 10px;
            font-size: 14px;
            margin-bottom: 12px;
        }

        input::placeholder {
            color: #B8C2D1;
        }

        .btn {
            width: 100%;
            background: #5E81AC;
            color: #ECEFF4;
            border: none;
            border-radius: 6px;
            padding: 9px;
            font-size: 14px;
            cursor: pointer;
            margin-top: 4px;
            font-weight: bold;
        }

        .btn:hover {
            background: #81A1C1;
        }

        .flash {
            background: rgba(59, 66, 82, 0.95);
            border: 1px solid #BF616A;
            color: #BF616A;
            border-radius: 6px;
            padding: 8px 10px;
            font-size: 13px;
            margin-bottom: 12px;
            font-weight: bold;
        }

        .link-row {
            text-align: center;
            font-size: 13px;
            color: #D8DEE9;
            margin-top: 1rem;
        }

        .link-row a {
            color: #81A1C1;
            text-decoration: none;
            font-weight: bold;
        }

        .link-row a:hover {
            color: #ECEFF4;
            text-decoration: underline;
        }

        @media (max-width: 500px) {
            body {
                padding: 12px;
            }

            .card {
                width: 100%;
                box-sizing: border-box;
            }
        }
    </style>
</head>
<body>
<div class="card">
    <h2>Sign in</h2>
    <p class="subtitle">Welcome back to Elevate Retail</p>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for msg in messages %}
                <div class="flash">{{ msg }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form action="{{ url_for('auth.login') }}" method="POST">
        <label>Email</label>
        <input type="email" name="email" placeholder="you@email.com" required>

        <label>First name</label>
        <input type="text" name="first_name" placeholder="As it appears on your account" required>

        <button class="btn" type="submit">Sign in</button>
    </form>

    <div class="link-row">Don't have an account? <a href="{{ url_for('auth.register') }}">Sign up</a></div>
</div>
</body>
</html>
